<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Caculator</h1>
    <form id="calcForm">
        <div class="input-group">
            <input type="number" id="num1" value="12">
            <input type="number" id="num2" value="12">
        </div>
        <div class="button-group">
            <button type="button" onclick="calculate('+')">Addition(+)</button>
            <button type="button" onclick="calculate('-')">Subtraction(-)</button>
            <button type="button" onclick="calculate('X')">Multiplication(X)</button>
            <button type="button" onclick="calculate('/')">Division(/)</button>
        </div>
    </form>
    <p id="result">Result Division :</p>
    <script src="app.js"></script>
</body>
</html>
